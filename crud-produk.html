<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRUD Produk — PT Pionir Nusantara Manufacturing</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;
  --surface:#fff;
  --surface-2:#f5f6f8;
  --border:#e2e4e9;
  --border-strong:#c8ccd6;
  --text:#111827;
  --text-secondary:#4b5563;
  --text-muted:#9ca3af;
  --accent:#1d5bd4;
  --accent-bg:#eff4ff;
  --accent-text:#1d4ed8;
  --success:#15803d;
  --success-bg:#f0fdf4;
  --success-border:#86efac;
  --danger:#b91c1c;
  --danger-bg:#fff5f5;
  --danger-border:#fca5a5;
  --accent-hover:#1749b1;
  --radius:10px;
  --mono:'JetBrains Mono',monospace;
}
body[data-theme="dark"]{
  --bg:#111318;
  --surface:#1a1d24;
  --surface-2:#22262e;
  --border:#2c313b;
  --border-strong:#3d4350;
  --text:#e8eaed;
  --text-secondary:#a8afbc;
  --text-muted:#6b7280;
  --accent:#5b8def;
  --accent-bg:#1c2b45;
  --accent-text:#7ba8f5;
  --success:#4ade80;
  --success-bg:#132a1c;
  --success-border:#1f5c37;
  --danger:#f87171;
  --danger-bg:#3a1a1a;
  --danger-border:#6b2b2b;
  --accent-hover:#3f6fd6;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;transition:background .2s,color .2s}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.brand-title{font-size:14px;font-weight:600}
.brand-sub{font-size:11px;color:var(--text-muted)}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);cursor:pointer;font-size:15px}

/* AUTH GATE */
.gate-wrap{min-height:calc(100vh - 53px);display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:380px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.gate-icon{width:44px;height:44px;background:var(--accent-bg);color:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px}
.gate-title{font-size:17px;font-weight:600;margin-bottom:4px}
.gate-desc{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.5}
.field-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;display:block}
.field-input{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);font-family:inherit}
.field-input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;margin-top:14px;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:var(--accent-hover)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.gate-msg{margin-top:14px;padding:10px 12px;border-radius:8px;font-size:13px;display:none}
.gate-msg.show{display:block}
.gate-msg.success{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.gate-msg.error{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.gate-footer{margin-top:18px;font-size:11px;color:var(--text-muted);text-align:center}

/* AUTHENTICATED VIEW (placeholder buat sekarang) */
.app-wrap{display:none;padding:24px;max-width:960px;margin:0 auto}
.app-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.app-title{font-size:18px;font-weight:600}
.user-chip{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}
.placeholder-box{background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--radius);padding:40px;text-align:center;color:var(--text-muted);font-size:13px}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo"><i class="ti ti-package"></i></div>
    <div>
      <div class="brand-title">CRUD Produk</div>
      <div class="brand-sub">PNM · SMY · METO</div>
    </div>
  </div>
  <button class="theme-toggle" id="themeToggle"><i class="ti ti-moon"></i></button>
</header>

<!-- AUTH GATE -->
<div class="gate-wrap" id="gateWrap">
  <div class="gate-card">
    <div class="gate-icon"><i class="ti ti-lock"></i></div>
    <div class="gate-title" id="gateTitle">Masuk ke CRUD Produk</div>
    <div class="gate-desc" id="gateDesc">Khusus tim internal. Masukkan email kamu, nanti dikirim link login ke inbox.</div>

    <div id="emailFormWrap">
      <label class="field-label" for="emailInput">Email</label>
      <input type="email" id="emailInput" class="field-input" placeholder="nama@email.com" autocomplete="email"/>
      <button class="btn-primary" id="sendLinkBtn">Kirim Link Login</button>
    </div>

    <div class="gate-msg" id="gateMsg"></div>
    <div class="gate-footer">Akses dibatasi hanya untuk email yang terdaftar di tim.</div>
  </div>
</div>

<!-- AUTHENTICATED VIEW -->
<div class="app-wrap" id="appWrap">
  <div class="app-header">
    <div class="app-title">CRUD Produk</div>
    <div class="user-chip">
      <i class="ti ti-user-circle"></i>
      <span id="userEmailLabel"></span>
      <button class="logout-btn" id="logoutBtn">Keluar</button>
    </div>
  </div>
  <div class="placeholder-box">
    Login berhasil ✅<br/>
    Form tambah/edit produk menyusul di langkah berikutnya.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ptkkbsemihcyndisjoor.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0a2tic2VtaWhjeW5kaXNqb29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Njc4MzgsImV4cCI6MjA5ODA0MzgzOH0.QsCqmcqQcXvz1f8bLkagvMbAGUBbBP-3Wa5Aore5OMo';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---- Theme toggle (ikut preferensi sistem, tersimpan di localStorage) ----
const themeToggle = document.getElementById('themeToggle');
function applyTheme(t){
  document.body.setAttribute('data-theme', t);
  themeToggle.innerHTML = t === 'dark' ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
  localStorage.setItem('theme', t);
}
applyTheme(localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
themeToggle.addEventListener('click', () => {
  applyTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

// ---- Elemen ----
const gateWrap = document.getElementById('gateWrap');
const appWrap = document.getElementById('appWrap');
const gateTitle = document.getElementById('gateTitle');
const gateDesc = document.getElementById('gateDesc');
const emailFormWrap = document.getElementById('emailFormWrap');
const emailInput = document.getElementById('emailInput');
const sendLinkBtn = document.getElementById('sendLinkBtn');
const gateMsg = document.getElementById('gateMsg');
const userEmailLabel = document.getElementById('userEmailLabel');
const logoutBtn = document.getElementById('logoutBtn');

function showMsg(text, type){
  gateMsg.textContent = text;
  gateMsg.className = 'gate-msg show ' + type;
}

// ---- Kirim Magic Link ----
sendLinkBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim().toLowerCase();
  if(!email || !email.includes('@')){
    showMsg('Masukkan email yang valid dulu ya.', 'error');
    return;
  }
  sendLinkBtn.disabled = true;
  sendLinkBtn.textContent = 'Mengirim...';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + '/crud-produk.html' }
  });

  sendLinkBtn.disabled = false;
  sendLinkBtn.textContent = 'Kirim Link Login';

  if (error) {
    showMsg('Gagal kirim link: ' + error.message, 'error');
    return;
  }
  showMsg('Link login udah dikirim ke ' + email + '. Cek inbox (atau folder spam) ya.', 'success');
  emailFormWrap.style.display = 'none';
});

// ---- Cek whitelist setelah login ----
async function checkWhitelistAndShowApp(session){
  const email = session.user.email.toLowerCase();

  const { data, error } = await sb
    .from('allowed_users')
    .select('email, role')
    .eq('email', email)
    .maybeSingle();

  if (error || !data) {
    // Bukan bagian tim -> logout paksa & tampilkan pesan
    await sb.auth.signOut();
    gateTitle.textContent = 'Akses Ditolak';
    gateDesc.textContent = 'Email ' + email + ' belum terdaftar sebagai tim. Hubungi admin kalau ini seharusnya salah.';
    emailFormWrap.style.display = 'none';
    gateMsg.className = 'gate-msg show error';
    gateMsg.textContent = 'Silakan hubungi admin untuk ditambahkan ke daftar akses.';
    gateWrap.style.display = 'flex';
    appWrap.style.display = 'none';
    return;
  }

  // Lolos whitelist
  userEmailLabel.textContent = email + ' · ' + data.role;
  gateWrap.style.display = 'none';
  appWrap.style.display = 'block';
}

// ---- Logout ----
logoutBtn.addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.reload();
});

// ---- Cek session saat load & saat auth state berubah ----
sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    checkWhitelistAndShowApp(session);
  } else {
    gateWrap.style.display = 'flex';
    appWrap.style.display = 'none';
  }
});

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) checkWhitelistAndShowApp(session);
});
</script>

</body>
</html>
